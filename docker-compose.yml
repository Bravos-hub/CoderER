services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: codeer
      POSTGRES_USER: codeer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-development-only}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - codeer-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codeer -d codeer']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend, host_access]
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        else
          exec redis-server --appendonly yes
        fi
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - codeer-redis:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'if [ -n "$${REDIS_PASSWORD}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend, host_access]
    restart: unless-stopped

  migrate:
    profiles: ['app']
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.migrate
    environment:
      NODE_ENV: production
      DATABASE_ADMIN_URL: postgresql://codeer:${POSTGRES_PASSWORD:-development-only}@postgres:5432/codeer
      DATABASE_RUNTIME_USER: ${DATABASE_RUNTIME_USER:-codeer_app}
      DATABASE_RUNTIME_PASSWORD: ${DATABASE_RUNTIME_PASSWORD:-development-app-only}
      DATABASE_WORKER_USER: ${DATABASE_WORKER_USER:-codeer_worker}
      DATABASE_WORKER_PASSWORD: ${DATABASE_WORKER_PASSWORD:-development-worker-only}
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop: [ALL]
    security_opt: ['no-new-privileges:true']
    networks: [backend]
    restart: 'no'

  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      NODE_ENV: production
      API_PORT: 4100
      API_AUTH_MODE: api-key
      API_REQUIRE_TENANT_CONTEXT: 'true'
      API_REQUIRE_SIGNED_CONTEXT: 'true'
      REQUIRE_IDEMPOTENCY_KEYS: 'true'
      REQUEST_CONTEXT_SIGNING_SECRET: ${REQUEST_CONTEXT_SIGNING_SECRET:-}
      REQUEST_CONTEXT_SIGNING_SECRET_PREVIOUS: ${REQUEST_CONTEXT_SIGNING_SECRET_PREVIOUS:-}
      DEFAULT_ORGANIZATION_ID: ${DEFAULT_ORGANIZATION_ID:-00000000-0000-4000-8000-000000000001}
      CODEER_API_KEY: ${CODEER_API_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      DATABASE_URL: postgresql://${DATABASE_RUNTIME_USER:-codeer_app}:${DATABASE_RUNTIME_PASSWORD:-development-app-only}@postgres:5432/codeer?schema=public
      SANDBOX_DEFAULT_IMAGE: ${SANDBOX_DEFAULT_IMAGE:-node:24-bookworm-slim}
      SANDBOX_HELPER_IMAGE: ${SANDBOX_HELPER_IMAGE:-node:24-bookworm-slim}
      SANDBOX_APPROVED_REGISTRIES: ${SANDBOX_APPROVED_REGISTRIES:-docker.io,ghcr.io}
      SANDBOX_INSTALL_NETWORK: ${SANDBOX_INSTALL_NETWORK:-}
      SANDBOX_INSTALL_ALLOWED_REGISTRIES: ${SANDBOX_INSTALL_ALLOWED_REGISTRIES:-}
      SANDBOX_INSTALL_ALLOWED_DOMAINS: ${SANDBOX_INSTALL_ALLOWED_DOMAINS:-}
      SANDBOX_ALLOW_INSTALL_SCRIPTS_OVERRIDE: ${SANDBOX_ALLOW_INSTALL_SCRIPTS_OVERRIDE:-false}
      SANDBOX_CPU_CORES: ${SANDBOX_CPU_CORES:-1}
      SANDBOX_MEMORY_BYTES: ${SANDBOX_MEMORY_BYTES:-1073741824}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-256}
      SANDBOX_WORKSPACE_BYTES: ${SANDBOX_WORKSPACE_BYTES:-2147483648}
      SANDBOX_TEMP_BYTES: ${SANDBOX_TEMP_BYTES:-536870912}
      SANDBOX_COMMAND_TIMEOUT_MS: ${SANDBOX_COMMAND_TIMEOUT_MS:-900000}
      SANDBOX_EXECUTION_TIMEOUT_MS: ${SANDBOX_EXECUTION_TIMEOUT_MS:-2700000}
      SANDBOX_MAX_COMMANDS: ${SANDBOX_MAX_COMMANDS:-10}
      SANDBOX_MAX_LOG_BYTES: ${SANDBOX_MAX_LOG_BYTES:-8388608}
      SANDBOX_MAX_ARTIFACT_BYTES: ${SANDBOX_MAX_ARTIFACT_BYTES:-67108864}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION:-}
      OPENAI_PROJECT: ${OPENAI_PROJECT:-}
      AI_ALLOWED_MODELS: ${AI_ALLOWED_MODELS:-gpt-5.6}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-5.6}
      AI_MODEL_PRICING_JSON: ${AI_MODEL_PRICING_JSON:-{}}
      AI_INVESTIGATION_CONCURRENCY: ${AI_INVESTIGATION_CONCURRENCY:-2}
      AI_MAX_MODEL_INVOCATIONS: ${AI_MAX_MODEL_INVOCATIONS:-20}
      AI_MAX_TOOL_CALLS: ${AI_MAX_TOOL_CALLS:-100}
      AI_MAX_INPUT_TOKENS: ${AI_MAX_INPUT_TOKENS:-200000}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-30000}
      AI_MAX_COST_USD: ${AI_MAX_COST_USD:-25}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-2700000}
      AI_RETENTION_DAYS: ${AI_RETENTION_DAYS:-30}
      AI_STORE_PROVIDER_RESPONSES: ${AI_STORE_PROVIDER_RESPONSES:-false}
    ports:
      - '127.0.0.1:4100:4100'
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    security_opt: ['no-new-privileges:true']
    networks: [frontend, backend]
    restart: unless-stopped

  worker:
    profiles: ['app']
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      DATABASE_URL: postgresql://${DATABASE_WORKER_USER:-codeer_worker}:${DATABASE_WORKER_PASSWORD:-development-worker-only}@postgres:5432/codeer?schema=public
      INCIDENT_TRIAGE_CONCURRENCY: ${INCIDENT_TRIAGE_CONCURRENCY:-4}
      OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      OUTBOX_LOCK_TIMEOUT_MS: ${OUTBOX_LOCK_TIMEOUT_MS:-30000}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-10}
      REPOSITORY_WORKSPACE_ROOT: /var/lib/codeer/workspaces
      REPOSITORY_CLONE_DEPTH: ${REPOSITORY_CLONE_DEPTH:-1}
      MAX_REPOSITORY_FILES: ${MAX_REPOSITORY_FILES:-100000}
      MAX_REPOSITORY_BYTES: ${MAX_REPOSITORY_BYTES:-2147483648}
      MAX_GITHUB_BRANCHES: ${MAX_GITHUB_BRANCHES:-500}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github-app.pem
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SANDBOX_DEFAULT_IMAGE: ${SANDBOX_DEFAULT_IMAGE:-node:24-bookworm-slim}
      SANDBOX_HELPER_IMAGE: ${SANDBOX_HELPER_IMAGE:-node:24-bookworm-slim}
      SANDBOX_APPROVED_REGISTRIES: ${SANDBOX_APPROVED_REGISTRIES:-docker.io,ghcr.io}
      SANDBOX_INSTALL_NETWORK: ${SANDBOX_INSTALL_NETWORK:-}
      SANDBOX_INSTALL_ALLOWED_REGISTRIES: ${SANDBOX_INSTALL_ALLOWED_REGISTRIES:-}
      SANDBOX_INSTALL_ALLOWED_DOMAINS: ${SANDBOX_INSTALL_ALLOWED_DOMAINS:-}
      SANDBOX_ALLOW_INSTALL_SCRIPTS_OVERRIDE: ${SANDBOX_ALLOW_INSTALL_SCRIPTS_OVERRIDE:-false}
      SANDBOX_CPU_CORES: ${SANDBOX_CPU_CORES:-1}
      SANDBOX_MEMORY_BYTES: ${SANDBOX_MEMORY_BYTES:-1073741824}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-256}
      SANDBOX_WORKSPACE_BYTES: ${SANDBOX_WORKSPACE_BYTES:-2147483648}
      SANDBOX_TEMP_BYTES: ${SANDBOX_TEMP_BYTES:-536870912}
      SANDBOX_COMMAND_TIMEOUT_MS: ${SANDBOX_COMMAND_TIMEOUT_MS:-900000}
      SANDBOX_EXECUTION_TIMEOUT_MS: ${SANDBOX_EXECUTION_TIMEOUT_MS:-2700000}
      SANDBOX_MAX_COMMANDS: ${SANDBOX_MAX_COMMANDS:-10}
      SANDBOX_MAX_LOG_BYTES: ${SANDBOX_MAX_LOG_BYTES:-8388608}
      SANDBOX_MAX_ARTIFACT_BYTES: ${SANDBOX_MAX_ARTIFACT_BYTES:-67108864}
      SANDBOX_EXECUTION_CONCURRENCY: ${SANDBOX_EXECUTION_CONCURRENCY:-1}
      SANDBOX_EXECUTION_LEASE_MS: ${SANDBOX_EXECUTION_LEASE_MS:-60000}
      SANDBOX_RECONCILE_INTERVAL_MS: ${SANDBOX_RECONCILE_INTERVAL_MS:-60000}
      SANDBOX_STALE_AFTER_MS: ${SANDBOX_STALE_AFTER_MS:-3600000}
      SANDBOX_DOCKER_HOST: ${SANDBOX_DOCKER_HOST:-}
      SANDBOX_DOCKER_TLS_VERIFY: ${SANDBOX_DOCKER_TLS_VERIFY:-false}
      SANDBOX_DOCKER_CERT_PATH: ${SANDBOX_DOCKER_CERT_PATH:-}
      SANDBOX_COMMAND_OUTPUT_LIMIT_BYTES: ${SANDBOX_COMMAND_OUTPUT_LIMIT_BYTES:-16777216}
      SANDBOX_WORKSPACE_VOLUME_DRIVER: ${SANDBOX_WORKSPACE_VOLUME_DRIVER:-}
      SANDBOX_WORKSPACE_VOLUME_SIZE_OPTION: ${SANDBOX_WORKSPACE_VOLUME_SIZE_OPTION:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION:-}
      OPENAI_PROJECT: ${OPENAI_PROJECT:-}
      AI_ALLOWED_MODELS: ${AI_ALLOWED_MODELS:-gpt-5.6}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-5.6}
      AI_MODEL_PRICING_JSON: ${AI_MODEL_PRICING_JSON:-{}}
      AI_INVESTIGATION_CONCURRENCY: ${AI_INVESTIGATION_CONCURRENCY:-2}
      AI_INVESTIGATION_LEASE_MS: ${AI_INVESTIGATION_LEASE_MS:-90000}
      AI_INVESTIGATION_RECONCILE_INTERVAL_MS: ${AI_INVESTIGATION_RECONCILE_INTERVAL_MS:-60000}
      AI_INVESTIGATION_STALE_AFTER_MS: ${AI_INVESTIGATION_STALE_AFTER_MS:-3600000}
      AI_MAX_CONTEXT_ITEMS: ${AI_MAX_CONTEXT_ITEMS:-500}
      AI_MAX_CONTEXT_BYTES: ${AI_MAX_CONTEXT_BYTES:-8388608}
      AI_MAX_CONTEXT_ITEM_BYTES: ${AI_MAX_CONTEXT_ITEM_BYTES:-262144}
      AI_MAX_MODEL_INVOCATIONS: ${AI_MAX_MODEL_INVOCATIONS:-20}
      AI_MAX_TOOL_CALLS: ${AI_MAX_TOOL_CALLS:-100}
      AI_MAX_INPUT_TOKENS: ${AI_MAX_INPUT_TOKENS:-200000}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-30000}
      AI_MAX_COST_USD: ${AI_MAX_COST_USD:-25}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-2700000}
      AI_RETENTION_DAYS: ${AI_RETENTION_DAYS:-30}
      AI_STORE_PROVIDER_RESPONSES: ${AI_STORE_PROVIDER_RESPONSES:-false}
    volumes:
      - codeer-workspaces:/var/lib/codeer/workspaces
      - '${GITHUB_APP_PRIVATE_KEY_FILE:-/dev/null}:/run/secrets/github-app.pem:ro'
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: [ALL]
    security_opt: ['no-new-privileges:true']
    networks: [backend, egress]
    restart: unless-stopped

  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NODE_ENV: production
      CODEER_API_URL_INTERNAL: http://api:4100/api/v1
      CODEER_INTERNAL_API_KEY: ${CODEER_API_KEY:-}
      CODEER_ORGANIZATION_ID: ${DEFAULT_ORGANIZATION_ID:-00000000-0000-4000-8000-000000000001}
      CODEER_BFF_ACTOR_ID: codeer-web-bff
      CODEER_CONTEXT_SIGNING_SECRET: ${REQUEST_CONTEXT_SIGNING_SECRET:-}
      CODEER_USER_SESSION_SECRET: ${CODEER_USER_SESSION_SECRET:-}
      CODEER_DEVELOPMENT_USER_ID: ${CODEER_DEVELOPMENT_USER_ID:-local-development-user}
      CODEER_DEVELOPMENT_USER_ROLES: ${CODEER_DEVELOPMENT_USER_ROLES:-ORGANIZATION_OWNER}
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      api:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    security_opt: ['no-new-privileges:true']
    networks: [frontend]
    restart: unless-stopped

networks:
  frontend:
  backend:
    internal: true
  host_access:
  egress:

volumes:
  codeer-postgres:
  codeer-redis:
  codeer-workspaces:
